kind = "web"
previewPath = "/"
title = "RME Palette Editor"
version = "1.0.0"
id = "artifacts/rme-palette-editor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22139

[services.development]
run = "pnpm --filter @workspace/rme-palette-editor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rme-palette-editor", "run", "build" ]
publicDir = "artifacts/rme-palette-editor/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22139"
BASE_PATH = "/"
